# =============================================================================
# Project Shooots - rendering, UI & colours. Game rules live in game.properties.
# Missing/invalid keys fall back to defaults. Colours are r,g,b or r,g,b,a (0-255).
# =============================================================================

# Window / panels - multiples of grid.unit
window.windowTiles=25
window.counterHeightTiles=2
window.pointerWidthTiles=4

# Disc & laser render geometry
disc.bigRadius=18
disc.smallRadius=10
laser.bounceAlphaFalloff=0.75

# Menu - selectable option ranges
menu.initialPlayers=4
menu.initialAiPlayers=3
menu.initialRoundLimit=4
menu.initialRoundTime=60
menu.maxPlayers=4
menu.maxRoundLimit=20
menu.roundLimitStep=4
menu.maxRoundTime=60
menu.roundTimeStep=5

# Menu - layout (px)
menu.fontSize=30
menu.rowSpacing=46
menu.panelPadX=28
menu.panelMargin=16

# Menu - theme (chrome colours + corner radius)
menu.theme.label=200,160,255
menu.theme.sublabel=160,200,220
menu.theme.value=170,130,220
menu.theme.separator=255,200,80,200
menu.theme.panelFill=20,15,40,185
menu.theme.panelBorder=130,60,180,120
menu.theme.panelGlow=160,80,220,45
menu.theme.highlightFill=200,160,255,55
menu.theme.highlightBorder=200,140,255,90
menu.theme.shadow=0,0,0,160
menu.theme.panelArc=28

# Map-object styling - sizes/factors
object.base.ringBig=25
object.base.ringSmall=15
object.disc.coreRadius=3
object.cursor.sizeFactor=0.5
object.cursor.standoffFactor=2.0
object.charge.glowThreshold=0.8

