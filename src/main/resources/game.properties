# =============================================================================
# Project Shooots - GAME RULES (single source of truth; no code defaults).
# Rendering/UI lives in graphic.properties. Every key is REQUIRED: a missing or
# unparseable key is logged and the game exits. Keep comments minimal.
# Naming: dotted hierarchy <group>.<name>; a player-editable option carries its
# caps inline as <key>.min / <key>.max / <key>.step. Order: online + run first,
# then round/match, then physics/gameplay.
# =============================================================================

# --- Online ---
online.host=
online.port=48900
online.port.min=1024
online.port.max=65535

# --- Run ---
game.seed=

# --- Round / match ---
round.timeSeconds=45
round.timeSeconds.min=10
round.timeSeconds.max=300
round.timeSeconds.step=5
round.limit=4
round.limit.min=2
round.limit.max=20
round.limit.step=2
round.initialPlayerNumber=4
round.endDelay=2
round.animationTime=1

# --- Disc physics ---
disc.speed=2.25
disc.speed.min=1.0
disc.speed.max=8.0
disc.speed.step=0.25
disc.maxBounces=9
disc.maxBounces.min=1
disc.maxBounces.max=20
disc.maxBounces.step=1
disc.maxPerPlayer=4
disc.maxPerShot=3
disc.bounceSpeedGain=1.25
disc.maxSpeedFactor=2

# --- Laser preview ---
laser.maxBounces=5
laser.maxBounces.min=0
laser.maxBounces.max=12
laser.maxBounces.step=1

# --- Power shot (hold to charge; bounces/speed scale off the disc) ---
power.enabled=true
power.chargeSeconds=0.8
power.speedFactor=1.9
power.maxBouncesFactor=1.5
power.captureStrength=2

# --- Base disruption ---
disruption.enabled=true
disruption.durationSeconds=4.0
disruption.durationSeconds.min=0.0
disruption.durationSeconds.max=12.0
disruption.durationSeconds.step=0.5
disruption.graceSeconds=3.0
disruption.graceSeconds.min=0.0
disruption.graceSeconds.max=12.0
disruption.graceSeconds.step=0.5

# --- Collision ---
collision.ballCollisionSize=4

# --- AI players ---
ai.scanAngles=24
ai.scanBudgetPerFrame=4
ai.skillsEnabled=true
ai.powerShotEnabled=true
ai.powerShotMinBounces=2
ai.baseAttackEnabled=true
ai.skill.accuracy=true
ai.skill.cursorSpeed=true
ai.skill.retake=true
ai.skill.defend=true
ai.skill.bouncePath=true
ai.skill.powerShot=true
ai.skill.baseAttack=true