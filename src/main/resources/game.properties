#
# Project Shooots — runtime configuration.
#
# Every tunable the game reads lives here; the code holds no hard-coded gameplay or layout values.
# Keys are grouped by concern. Any missing or invalid key falls back to the built-in default in
# GameConfigLoader.defaults(). Colours are "r,g,b" or "r,g,b,a" (0-255 per channel).
#

# =============================================================================
# Run
# =============================================================================
# Master random seed for a run (map generation + AI decisions).
# Leave BLANK for a fresh random run each launch; set an integer to make the whole run reproducible.
game.seed=

# =============================================================================
# Map geometry  (square playfield of tableSize x tableSize tiles, each "unit" px)
# =============================================================================
grid.unit=36
grid.tableSize=25

# =============================================================================
# Window / panels  (sizes are multiples of grid.unit so the layout scales with tile size)
# =============================================================================
# Playfield width/height in tiles (square window).
window.windowTiles=25
# Score-counter panel height, in tiles.
window.counterHeightTiles=2
# Side-pointer panel width, in tiles.
window.pointerWidthTiles=4

# =============================================================================
# Menu  (selectable option ranges + the menu's own layout)
# =============================================================================
# --- Initial selection shown when the menu opens ---
menu.initialPlayers=4
menu.initialAiPlayers=3
menu.initialRoundLimit=4
menu.initialRoundTime=60
# --- Option ranges and step sizes the player cycles through ---
menu.maxPlayers=4
menu.maxRoundLimit=20
menu.roundLimitStep=4
menu.maxRoundTime=60
menu.roundTimeStep=5
# --- Menu layout ---
# Point size the menu font is rendered at.
menu.fontSize=30
# Vertical gap (px) between consecutive menu rows.
menu.rowSpacing=46
# Horizontal padding (px) between the menu panel edge and its content.
menu.panelPadX=28
# Minimum gap (px) kept between the panel and the window edges.
menu.panelMargin=16

# =============================================================================
# Round / match pacing  (seconds, except delays which are in ticks)
# =============================================================================
round.roundTimeSeconds=60
round.roundLimit=2
round.roundEndDelay=2
round.animationTime=1

# =============================================================================
# Disc (projectile)
# =============================================================================
disc.bigRadius=18
disc.smallRadius=10
disc.moveSpeed=3.0
# Wall bounces a disc may take before it disappears.
disc.maxBounces=9
# Max discs a single player may have in flight at once.
disc.maxPerPlayer=4
# Discs released per shot/volley (1..maxPerPlayer); 1 keeps the classic one-disc-per-press feel.
disc.maxPerShot=3
# Smooth per-wall-bounce acceleration: realised speed is multiplied by this on every bounce.
# 1.0 = off; 1.06 = a subtle but cumulatively significant speed-up (~1.5x after ~7 bounces).
disc.bounceSpeedGain=1.25
# Hard cap on accelerated speed, as a multiple of moveSpeed (keeps collision detection safe).
disc.maxSpeedFactor=2

# Aiming-laser preview: number of predicted wall reflections (polyline segments after the origin).
laser.maxBounces=4

# =============================================================================
# Power shot (charged shot: hold the shoot key to fill the bar, auto-fires when full)
# =============================================================================
# Master switch for the charged power shot.
power.enabled=true
# Seconds the shoot key must be held for the charge ring to fill and auto-release the power shot.
power.chargeSeconds=0.6
# Power-disc launch speed as a multiple of disc.moveSpeed (it then accelerates like any disc).
power.speedFactor=1.9
# Bounce budget of a power disc -- more "deflection points" than a normal disc (disc.maxBounces).
power.maxBounces=16
# Capture levels a single power hit applies to a control point (normal hit = 1).
power.captureStrength=2

# =============================================================================
# Collision
# =============================================================================
# Collision detector edge tolerance.
collision.ballCollisionSize=4

# =============================================================================
# AI players
# =============================================================================
# Candidate firing angles scanned per AI decision (>=2; higher = smarter but costlier).
ai.scanAngles=24
# Max AI decision scans per frame across all AIs (caps worst-case cost).
ai.scanBudgetPerFrame=4
# Master switch for AI skill knobs; false makes every AI play at flat NORMAL skill.
ai.skillsEnabled=true
# Whether AIs may use the charged power shot (further gated per-AI by the powerShotTendency knob).
ai.powerShotEnabled=true
# Minimum bounce-path length for a target to count as "long range" and worth a power shot.
ai.powerShotMinBounces=2

# =============================================================================
# Palette  (r,g,b or r,g,b,a, 0-255 per channel)
# =============================================================================
color.background=95,99,104
color.standard=25,25,25
color.winBlock=68,74,80
color.deadLine=102,0,102
color.deadLineBackground=102,75,102
color.fontBackground=192,192,192
color.pointBarBackground=68,74,80
color.menuStandard=35,35,35,200
color.player1=124,252,0
color.player2=48,213,200
color.player3=252,3,0
color.player4=237,26,116
