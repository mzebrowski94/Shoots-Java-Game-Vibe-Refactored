# =============================================================================
# Project Shooots - game rules & logic. Rendering/UI lives in graphic.properties.
# Missing/invalid keys fall back to GameConfigLoader.defaults().
# =============================================================================

# Run
game.seed=

# Map - square playfield of tableSize x tableSize tiles, each grid.unit px
grid.unit=36
grid.tableSize=25

# Round / match pacing - seconds (delays in ticks)
round.roundTimeSeconds=60
round.roundLimit=2
round.roundEndDelay=2
round.animationTime=1

# Disc physics
disc.moveSpeed=3.0
disc.maxBounces=9
disc.maxPerPlayer=4
disc.maxPerShot=3
disc.bounceSpeedGain=1.25
disc.maxSpeedFactor=2

# Laser preview - number of predicted reflections
laser.maxBounces=5

# Power shot - hold to charge, auto-fires when full
power.enabled=true
power.chargeSeconds=0.6
power.speedFactor=1.9
power.maxBounces=16
power.captureStrength=2

# Base disruption - hit an opponent's base to silence them, then the victim gets a short immunity
disruption.enabled=true
disruption.durationSeconds=4.0
disruption.graceSeconds=3.0

# Collision
collision.ballCollisionSize=4

# AI players
ai.scanAngles=24
ai.scanBudgetPerFrame=4
ai.skillsEnabled=true
ai.powerShotEnabled=true
ai.powerShotMinBounces=2
ai.baseAttackEnabled=true

# Per-skill on/off switches
ai.skill.accuracy=true
ai.skill.cursorSpeed=true
ai.skill.retake=true
ai.skill.defend=true
ai.skill.bouncePath=true
ai.skill.powerShot=true
ai.skill.baseAttack=true
